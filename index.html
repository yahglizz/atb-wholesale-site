<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>A Touch of Blessings Home Buyers — Sell Your House the Easy Way</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
  :root {
    --bg: #f4f1ea;
    --bg-2: #ece7dc;
    --paper: #fbf9f4;
    --ink: #1c1b18;
    --ink-2: #46443e;
    --ink-3: #7a766c;
    --line: #d9d3c4;
    --line-2: #e6e1d3;
    --accent: #5a6a3a;       /* deep olive */
    --accent-deep: #3f4b27;
    --accent-soft: #c7cda6;
    --gold: #b89456;
    --danger: #b14a3a;
    --ok: #4a7a4a;
    --radius: 14px;
    --radius-lg: 22px;
    --shadow-sm: 0 1px 2px rgba(28,27,24,.04), 0 2px 6px rgba(28,27,24,.05);
    --shadow-md: 0 8px 24px rgba(28,27,24,.08), 0 2px 6px rgba(28,27,24,.04);
    --shadow-lg: 0 24px 60px rgba(28,27,24,.18), 0 8px 16px rgba(28,27,24,.08);
    --serif: "Instrument Serif", "Cormorant Garamond", Georgia, serif;
    --sans: "Geist", ui-sans-serif, system-ui, -apple-system, sans-serif;
    --mono: "Geist Mono", ui-monospace, "SF Mono", Menlo, monospace;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: var(--sans);
    font-size: 16px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }
  img { max-width: 100%; display: block; }
  a { color: inherit; text-decoration: none; }
  button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
  input, select, textarea { font-family: inherit; font-size: inherit; color: inherit; }

  .container {
    max-width: 1280px;
    margin: 0 auto;
    padding: 0 32px;
  }
  @media (max-width: 720px) {
    .container { padding: 0 20px; }
  }

  .serif { font-family: var(--serif); font-weight: 400; letter-spacing: -0.01em; }
  .mono  { font-family: var(--mono); }

  /* utility: subtle striped placeholder for missing imagery */
  .img-ph {
    background:
      repeating-linear-gradient(135deg, rgba(28,27,24,.05) 0 1px, transparent 1px 10px),
      var(--bg-2);
    color: var(--ink-3);
    display: flex; align-items: center; justify-content: center;
    font-family: var(--mono);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    border-radius: var(--radius);
  }

  /* ===== Nav ===== */
  .nav {
    position: sticky; top: 0; z-index: 40;
    background: rgba(244, 241, 234, 0.78);
    backdrop-filter: saturate(140%) blur(14px);
    -webkit-backdrop-filter: saturate(140%) blur(14px);
    border-bottom: 1px solid rgba(28,27,24,.06);
  }
  .nav-inner {
    display: flex; align-items: center; justify-content: space-between;
    height: 72px;
  }
  .brand { display: flex; align-items: center; gap: 12px; }
  .brand-mark {
    width: 52px; height: 52px; border-radius: 14px;
    background: var(--ink);
    display: grid; place-items: center;
    overflow: hidden;
    padding: 4px;
    flex-shrink: 0;
  }
  .brand-mark img {
    width: 100%; height: 100%;
    object-fit: contain;
    display: block;
  }
  .brand-name { font-family: var(--serif); font-size: 22px; line-height: 1; }
  .brand-name em { font-style: italic; }
  .brand-sub { font-family: var(--mono); font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--ink-3); margin-top: 4px; }
  .nav-links { display: flex; gap: 28px; }
  .nav-links a {
    font-size: 14px; color: var(--ink-2);
    padding: 8px 4px;
    border-bottom: 1px solid transparent;
    transition: color .15s, border-color .15s;
  }
  .nav-links a:hover { color: var(--ink); border-bottom-color: var(--ink); }
  .nav-cta {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 10px 18px;
    border-radius: 999px;
    background: var(--ink);
    color: var(--paper);
    font-size: 14px; font-weight: 500;
  }
  .nav-cta:hover { background: var(--accent-deep); }
  .nav-cta .dot { width: 6px; height: 6px; border-radius: 50%; background: #6ec76e; box-shadow: 0 0 0 3px rgba(110,199,110,.25); }
  @media (max-width: 900px) {
    .nav-links { display: none; }
  }

  /* ===== Hero ===== */
  .hero {
    position: relative;
    padding: 88px 0 96px;
    isolation: isolate;
    color: var(--paper);
    min-height: 760px;
    display: flex;
    align-items: center;
  }
  .hero-inner { width: 100%; }
  .hero-copy { max-width: 920px; }
  .hero::before {
    content: "";
    position: absolute; inset: 0;
    background-image: url("assets/hero-bg.png");
    background-size: cover;
    background-position: center 35%;
    z-index: -2;
  }
  .hero::after {
    content: "";
    position: absolute; inset: 0;
    background:
      linear-gradient(180deg, rgba(20,22,28,.55) 0%, rgba(20,22,28,.35) 35%, rgba(20,22,28,.78) 100%),
      linear-gradient(90deg, rgba(20,22,28,.55) 0%, rgba(20,22,28,.15) 60%, rgba(20,22,28,.05) 100%);
    z-index: -1;
  }
  .hero-scroll-cta {
    display: inline-flex; align-items: center; gap: 12px;
    margin-top: 36px;
    padding: 16px 26px;
    border-radius: 999px;
    background: var(--paper);
    color: var(--ink);
    font-weight: 500;
    font-size: 15px;
    box-shadow: var(--shadow-md);
    transition: transform .2s, box-shadow .2s;
  }
  .hero-scroll-cta:hover { transform: translateY(-2px); box-shadow: var(--shadow-lg); }
  .hero-scroll-cta .arrow {
    width: 26px; height: 26px; border-radius: 50%;
    background: var(--ink); color: var(--paper);
    display: grid; place-items: center;
    font-size: 14px;
    animation: bob 1.8s ease-in-out infinite;
  }
  @keyframes bob {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(3px); }
  }

  /* ===== Form Section (now standalone, below hero) ===== */
  .form-section {
    background: var(--bg-2);
    padding: 88px 0;
    position: relative;
  }
  .form-section-grid {
    display: grid;
    grid-template-columns: 1fr 1.05fr;
    gap: 64px;
    align-items: start;
  }
  @media (max-width: 980px) {
    .form-section-grid { grid-template-columns: 1fr; gap: 36px; }
  }
  .form-section-aside { padding-top: 12px; }
  .form-section-aside .num {
    font-family: var(--mono); font-size: 12px; letter-spacing: 0.16em; text-transform: uppercase;
    color: var(--ink-3); margin-bottom: 14px;
  }
  .form-section-h {
    font-family: var(--serif);
    font-size: clamp(40px, 4.6vw, 60px);
    line-height: 1.02;
    letter-spacing: -0.015em;
    margin: 0 0 24px;
    color: var(--ink);
  }
  .form-section-h em { font-style: italic; color: var(--accent-deep); }
  .form-section-note {
    font-size: 16px;
    color: var(--ink-2);
    max-width: 44ch;
    margin: 0 0 28px;
    line-height: 1.55;
  }
  .form-section-list {
    list-style: none;
    padding: 0;
    margin: 0;
    display: grid;
    gap: 14px;
  }
  .form-section-list li {
    display: grid;
    grid-template-columns: 24px 1fr;
    gap: 14px;
    align-items: center;
    font-size: 15px;
    color: var(--ink);
    line-height: 1.4;
  }
  .form-section-list li .bullet {
    width: 24px; height: 24px; border-radius: 50%;
    background: var(--accent); color: var(--paper);
    display: inline-flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .form-section-list li .bullet svg { display: block; }
  .form-section-list li .txt { display: block; }
  .hero .h1 { color: var(--paper); }
  .hero .h1 em { color: #e6c98a; }
  .hero .h1 .strike::after { background: var(--paper); }
  .hero .lede { color: rgba(251,249,244,.85); }
  .hero .eyebrow {
    background: rgba(20,22,28,.45);
    border-color: rgba(251,249,244,.22);
    color: rgba(251,249,244,.9);
    backdrop-filter: blur(6px);
  }
  .hero .trust-item { color: rgba(251,249,244,.92); }
  .hero .trust-item span[style] { color: #b3d6a8 !important; }
  .hero .stat-row {
    background: rgba(251,249,244,.18);
    border-top-color: rgba(251,249,244,.22);
    border-bottom-color: rgba(251,249,244,.22);
  }
  .hero .stat {
    background: rgba(20,22,28,.45);
    backdrop-filter: blur(6px);
  }
  .hero .stat .num { color: var(--paper); }
  .hero .stat .num em { color: #e6c98a; }
  .hero .stat .lbl { color: rgba(251,249,244,.65); }
  .hero-grid {
    display: grid;
    grid-template-columns: 1.05fr 1fr;
    gap: 56px;
    align-items: start;
  }
  @media (max-width: 980px) {
    .hero-grid { grid-template-columns: 1fr; gap: 36px; }
    .hero { min-height: 0; padding: 64px 0 72px; }
  }

  .eyebrow {
    display: inline-flex; align-items: center; gap: 10px;
    padding: 6px 12px 6px 8px;
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: 999px;
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--ink-2);
  }
  .eyebrow .pulse {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--ok);
    box-shadow: 0 0 0 0 rgba(74,122,74,.4);
    animation: pulse 2.2s infinite;
  }
  @keyframes pulse {
    0% { box-shadow: 0 0 0 0 rgba(74,122,74,.45); }
    70% { box-shadow: 0 0 0 8px rgba(74,122,74,0); }
    100% { box-shadow: 0 0 0 0 rgba(74,122,74,0); }
  }

  .h1 {
    font-family: var(--serif);
    font-size: clamp(44px, 6.2vw, 84px);
    line-height: 0.98;
    letter-spacing: -0.02em;
    margin: 22px 0 18px;
    color: var(--ink);
  }
  .h1 em { font-style: italic; color: var(--accent-deep); }
  .h1 .strike { position: relative; }
  .h1 .strike::after {
    content: ""; position: absolute; left: -2%; right: -2%; top: 55%;
    height: 2px; background: var(--ink); transform: rotate(-3deg);
  }

  .lede {
    font-size: 18px;
    color: var(--ink-2);
    max-width: 540px;
    line-height: 1.5;
  }

  .trust-row {
    margin-top: 28px;
    display: flex; flex-wrap: wrap; gap: 18px 28px;
    align-items: center;
  }
  .trust-item { display: flex; align-items: center; gap: 10px; font-size: 13px; color: var(--ink-2); }
  .trust-item svg { flex-shrink: 0; }

  .stat-row {
    margin-top: 36px;
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 1px;
    background: var(--line);
    border-top: 1px solid var(--line);
    border-bottom: 1px solid var(--line);
  }
  .stat {
    background: var(--bg);
    padding: 20px 4px 18px;
  }
  .stat .num { font-family: var(--serif); font-size: 38px; line-height: 1; letter-spacing: -0.02em; }
  .stat .num em { font-style: italic; color: var(--accent); }
  .stat .lbl { font-family: var(--mono); font-size: 10.5px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--ink-3); margin-top: 8px; }

  /* ===== Form Card ===== */
  .form-card-wrap {
    position: relative;
  }
  .form-card-wrap::before {
    content: "";
    position: absolute; inset: 24px -18px -22px 22px;
    background: var(--accent-deep);
    border-radius: var(--radius-lg);
    z-index: 0;
    opacity: 0.95;
  }
  .form-card-wrap::after {
    content: "Cash offer in 24h";
    position: absolute;
    right: -10px; top: -16px;
    background: var(--gold);
    color: #1c1b18;
    font-family: var(--mono);
    font-size: 10.5px; letter-spacing: 0.14em; text-transform: uppercase;
    padding: 8px 14px;
    border-radius: 999px;
    transform: rotate(3deg);
    z-index: 3;
    box-shadow: var(--shadow-sm);
  }
  .form-card {
    position: relative; z-index: 1;
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: var(--radius-lg);
    padding: 28px 28px 24px;
    box-shadow: var(--shadow-md);
  }
  .form-head {
    display: flex; align-items: flex-start; justify-content: space-between;
    gap: 16px;
    padding-bottom: 18px;
    border-bottom: 1px solid var(--line-2);
    margin-bottom: 20px;
  }
  .form-head h3 {
    margin: 0;
    font-family: var(--serif);
    font-size: 30px;
    line-height: 1.05;
    letter-spacing: -0.01em;
  }
  .form-head p {
    margin: 6px 0 0;
    font-size: 13.5px;
    color: var(--ink-3);
    max-width: 320px;
  }
  .step-badge {
    flex-shrink: 0;
    text-align: right;
    font-family: var(--mono); font-size: 10.5px;
    letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--ink-3);
  }
  .step-badge .now { color: var(--accent-deep); font-weight: 500; }

  .progress {
    display: flex; gap: 6px;
    margin-bottom: 22px;
  }
  .progress .seg {
    flex: 1;
    height: 4px;
    background: var(--line-2);
    border-radius: 4px;
    overflow: hidden;
    position: relative;
  }
  .progress .seg.done { background: var(--accent); }
  .progress .seg.active {
    background: linear-gradient(to right, var(--accent), var(--accent) 40%, var(--line-2) 40%, var(--line-2));
  }

  .field { margin-bottom: 14px; }
  .field label {
    display: block;
    font-size: 12px;
    font-weight: 500;
    color: var(--ink-2);
    margin-bottom: 6px;
    letter-spacing: 0.01em;
  }
  .field label .req { color: var(--accent); margin-left: 2px; }
  .input, .select, .textarea {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 13px 14px;
    font-size: 15px;
    color: var(--ink);
    transition: border-color .15s, background .15s, box-shadow .15s;
  }
  .input:focus, .select:focus, .textarea:focus {
    outline: none;
    border-color: var(--accent);
    background: var(--paper);
    box-shadow: 0 0 0 4px rgba(90,106,58,.12);
  }
  .input::placeholder { color: var(--ink-3); }
  .field.row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .field.row2 > div { margin: 0; }
  .input-icon {
    position: relative;
  }
  .input-icon svg {
    position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
    color: var(--ink-3);
  }
  .input-icon .input { padding-left: 42px; }

  .chip-row { display: flex; flex-wrap: wrap; gap: 8px; }
  .chip {
    padding: 9px 14px;
    border-radius: 999px;
    background: var(--bg);
    border: 1px solid var(--line);
    font-size: 13.5px;
    color: var(--ink-2);
    cursor: pointer;
    transition: all .15s;
  }
  .chip:hover { border-color: var(--ink-3); color: var(--ink); }
  .chip.on {
    background: var(--ink);
    color: var(--paper);
    border-color: var(--ink);
  }

  .form-actions {
    display: flex; align-items: center; justify-content: space-between;
    margin-top: 22px; gap: 12px;
  }
  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 8px;
    padding: 14px 22px;
    border-radius: 999px;
    font-size: 14.5px;
    font-weight: 500;
    transition: all .15s;
    border: 1px solid transparent;
  }
  .btn-primary {
    background: var(--ink);
    color: var(--paper);
    box-shadow: var(--shadow-sm);
  }
  .btn-primary:hover { background: var(--accent-deep); transform: translateY(-1px); box-shadow: var(--shadow-md); }
  .btn-ghost { color: var(--ink-2); }
  .btn-ghost:hover { color: var(--ink); }
  .btn-block { width: 100%; }

  .micro {
    margin-top: 12px;
    display: flex; align-items: center; gap: 8px;
    font-size: 11.5px;
    color: var(--ink-3);
  }
  .micro svg { flex-shrink: 0; color: var(--ink-3); }

  .err {
    color: var(--danger);
    font-size: 12px;
    margin-top: 4px;
  }

  /* success state */
  .success {
    text-align: center;
    padding: 16px 6px 6px;
  }
  .success .check {
    width: 64px; height: 64px; border-radius: 50%;
    background: var(--accent);
    color: var(--paper);
    display: grid; place-items: center;
    margin: 0 auto 18px;
  }
  .success h3 { font-family: var(--serif); font-size: 32px; margin: 0 0 8px; letter-spacing: -0.01em; }
  .success p { color: var(--ink-2); font-size: 15px; max-width: 360px; margin: 0 auto; }
  .success-meta {
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 1px;
    background: var(--line-2);
    margin-top: 22px;
    border: 1px solid var(--line-2);
    border-radius: 10px;
    overflow: hidden;
  }
  .success-meta > div { background: var(--paper); padding: 14px 8px; }
  .success-meta .k { font-family: var(--mono); font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--ink-3); }
  .success-meta .v { font-family: var(--serif); font-size: 22px; margin-top: 6px; }

  /* ===== Section base ===== */
  section { padding: 96px 0; }
  .section-head {
    display: grid; grid-template-columns: auto 1fr auto;
    gap: 24px; align-items: end;
    margin-bottom: 56px;
  }
  .section-head .num {
    font-family: var(--mono); font-size: 12px; letter-spacing: 0.16em; text-transform: uppercase;
    color: var(--ink-3); padding-bottom: 14px;
  }
  .section-head h2 {
    font-family: var(--serif);
    font-size: clamp(38px, 4.6vw, 62px);
    line-height: 1.02;
    letter-spacing: -0.015em;
    margin: 0;
    max-width: 14ch;
  }
  .section-head h2 em { font-style: italic; color: var(--accent-deep); }
  .section-head .note {
    max-width: 320px;
    color: var(--ink-2);
    font-size: 15px;
    padding-bottom: 4px;
  }
  @media (max-width: 820px) {
    .section-head { grid-template-columns: 1fr; gap: 16px; }
    .section-head h2 { max-width: none; }
  }

  /* ===== Logos / press strip ===== */
  .strip {
    padding: 30px 0;
    border-top: 1px solid var(--line);
    border-bottom: 1px solid var(--line);
    background: var(--paper);
  }
  .strip-inner {
    display: flex; align-items: center; justify-content: space-between; gap: 24px;
    flex-wrap: wrap;
  }
  .strip-label { font-family: var(--mono); font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-3); }
  .strip-logos { display: flex; gap: 40px; align-items: center; flex-wrap: wrap; }
  .strip-logo {
    font-family: var(--serif); font-size: 20px; color: var(--ink-2); opacity: 0.7;
    letter-spacing: -0.01em;
  }
  .strip-logo.alt { font-family: var(--mono); text-transform: uppercase; font-size: 13px; letter-spacing: 0.18em; }
  .strip-logo .it { font-style: italic; }

  /* ===== How it works ===== */
  .steps {
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 1px;
    background: var(--line);
    border: 1px solid var(--line);
    border-radius: var(--radius-lg);
    overflow: hidden;
  }
  @media (max-width: 820px) {
    .steps { grid-template-columns: 1fr; }
  }
  .step {
    background: var(--paper);
    padding: 36px 32px 38px;
    position: relative;
  }
  .step .step-n {
    display: inline-block;
    font-family: var(--mono); font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--accent);
    padding-bottom: 18px;
  }
  .step h3 { font-family: var(--serif); font-size: 30px; margin: 0 0 10px; letter-spacing: -0.01em; line-height: 1.1; }
  .step p { margin: 0; color: var(--ink-2); font-size: 15px; line-height: 1.55; }
  .step .step-icon {
    width: 48px; height: 48px; border-radius: 12px;
    background: var(--bg-2);
    display: grid; place-items: center;
    color: var(--accent-deep);
    margin-bottom: 22px;
  }
  .step .meta { margin-top: 20px; font-family: var(--mono); font-size: 11px; color: var(--ink-3); letter-spacing: 0.06em; }

  /* ===== Why us ===== */
  .compare {
    display: grid; grid-template-columns: 1.1fr 1fr;
    gap: 0;
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: var(--radius-lg);
    overflow: hidden;
  }
  @media (max-width: 820px) {
    .compare { grid-template-columns: 1fr; }
  }
  .compare-col { padding: 36px 32px; }
  .compare-col.us {
    background: var(--ink);
    color: var(--paper);

  const filteredSuggestions = data.address.length >= 2
    ? ADDRESS_SUGGESTIONS.filter(s => s.line.toLowerCase().includes(data.address.toLowerCase()))
    : [];

  function validate(s) {
    const e = {};
    if (s === 1) {
      if (!data.address.trim()) e.address = "We need your address to start.";
    }
    if (s === 2) {
      if (!data.condition) e.condition = "Pick a condition so we can dial in your offer.";
      if (!data.timeline)  e.timeline  = "When are you hoping to close?";
    }
    if (s === 3) {
      if (!data.name.trim())  e.name  = "Your name?";
      if (!/^[\d\s\-\(\)\+]{10,}$/.test(data.phone)) e.phone = "We need a number we can reach you at.";
    }
    setErrs(e);
    return Object.keys(e).length === 0;
  }

  async function next() {
    if (!validate(step)) return;
    if (step < TOTAL_STEPS) {
      setStep(s => s + 1);
    } else {
      // Final step — submit to GHL then show success
      setSubmitting(true);
      await submitToGHL(data);
      setSubmitting(false);
      setDone(true);
    }
  }
  function back() {
    if (step > 1) setStep(s => s - 1);
  }

  if (done) {
    return (
      <div className="form-card-wrap" id="get-offer">
        <div className="form-card">
          <div className="success">
            <div className="check"><Icon.Check size={32} stroke={2.4} /></div>
            <h3>Offer in motion.</h3>
            <p>Thanks {data.name.split(" ")[0] || "friend"} — we received the details on <strong>{data.address || "your property"}</strong>. A senior acquisitions specialist will text you within <strong>2 business hours</strong>.</p>

              <div>
                <div className="k">Reference</div>
                <div className="v">#ATB-{Math.floor(Math.random() * 9000 + 1000)}</div>
              </div>
              <div>
                <div className="k">Offer ETA</div>
                <div className="v">~24h</div>
              </div>
              <div>
                <div className="k">Status</div>
                <div className="v" style={{color: "var(--accent)"}}>Active</div>
              </div>
            </div>
            <button
              className="btn btn-ghost"
              style={{ marginTop: 20 }}
              onClick={() => { setDone(false); setStep(1); setData({...data, address: "", city: ""}); }}
            >
              Submit another property →
            </button>
          </div>
        </div>
      </div>
    );
  }

  return (
    <div className="form-card-wrap" id="get-offer">
      <div className="form-card">
        <div className="form-head">
          <div>
            <h3>Get your cash offer.</h3>
            <p>Free. No obligation. Takes about 60 seconds.</p>
          </div>
          <div className="step-badge">
            <span className="now">Step {step}</span>
            <br/>of {TOTAL_STEPS}
          </div>
        </div>

        <div className="progress">
          {[1, 2, 3].map(i => (
            <div
              key={i}
              className={`seg ${i < step ? "done" : i === step ? "active" : ""}`}
            />
          ))}
        </div>

        {step === 1 && (
          <div>
            <div className="field" style={{ position: "relative" }} ref={addressRef}>
              <label>Property address <span className="req">*</span></label>
              <div className="input-icon">
                <Icon.Pin />
                <input
                  className="input"
                  type="text"
                  placeholder="Start typing your street address…"
                  value={data.address}
                  onChange={e => { update("address", e.target.value); setShowSuggest(true); }}
                  onFocus={() => setShowSuggest(true)}
                  onBlur={() => setTimeout(() => setShowSuggest(false), 150)}
                  autoFocus
                />
              </div>
              {showSuggest && filteredSuggestions.length > 0 && (
                <div className="suggest">
                  {filteredSuggestions.map((s, i) => (
                    <div
                      key={i}
                      className="s-item"
                      onMouseDown={() => {
                        update("address", s.line);
                        update("city", s.city);
                        setShowSuggest(false);
                      }}
                    >
                      <span className="s-pin"><Icon.Pin size={14} /></span>
                      <span>
                        {s.line}
                        <span className="s-city">{s.city}</span>
                      </span>
                    </div>
                  ))}
                </div>
              )}
              {errs.address && <div className="err">{errs.address}</div>}
            </div>

            <div className="field">
              <label>Property type</label>
              <div className="chip-row">
                {["Single family", "Townhouse", "Condo", "Multi-family", "Land"].map(t => (
                  <button
                    key={t}
                    type="button"
                    className={`chip ${data.propType === t ? "on" : ""}`}
                    onClick={() => update("propType", t)}
                  >{t}</button>
                ))}
              </div>
            </div>

            <div className="field row2">
              <div>
                <label>Bedrooms</label>
                <select className="select" value={data.beds} onChange={e => update("beds", e.target.value)}>
                  <option>1</option><option>2</option><option>3</option><option>4</option><option>5+</option>
                </select>
              </div>
              <div>
                <label>Bathrooms</label>
                <select className="select" value={data.baths} onChange={e => update("baths", e.target.value)}>
                  <option>1</option><option>1.5</option><option>2</option><option>2.5</option><option>3+</option>
                </select>
              </div>
            </div>

            <div className="form-actions">
              <button className="btn btn-ghost" disabled style={{visibility: "hidden"}}>Back</button>
              <button className="btn btn-primary" onClick={next}>
                Continue <Icon.ArrowRight />
              </button>
            </div>
          </div>
        )}

        {step === 2 && (
          <div>
            <div className="field">
              <label>Condition <span className="req">*</span></label>
              <div className="chip-row">
                {CONDITIONS.map(c => (
                  <button
                    key={c.v}
                    type="button"
                    className={`chip ${data.condition === c.v ? "on" : ""}`}
                    onClick={() => update("condition", c.v)}
                  >{c.l}</button>
                ))}
              </div>
              {errs.condition && <div className="err">{errs.condition}</div>}
            </div>

            <div className="field">
              <label>Timeline to sell <span className="req">*</span></label>
              <div className="chip-row">
                {TIMELINES.map(t => (
                  <button
                    key={t.v}
                    type="button"
                    className={`chip ${data.timeline === t.v ? "on" : ""}`}
                    onClick={() => update("timeline", t.v)}
                  >{t.l}</button>
                ))}
              </div>
              {errs.timeline && <div className="err">{errs.timeline}</div>}
            </div>

            <div className="field">
              <label>Why are you selling? <span style={{color: "var(--ink-3)", fontWeight: 400}}>(optional — helps us help you)</span></label>
              <div className="chip-row">
                {REASONS.map(r => (
                  <button
                    key={r}
                    type="button"
                    className={`chip ${data.reasons.includes(r) ? "on" : ""}`}
                    onClick={() => toggle("reasons", r)}
                  >{r}</button>
                ))}
              </div>
            </div>

            <div className="form-actions">
              <button className="btn btn-ghost" onClick={back}>
                <Icon.ArrowLeft /> Back
              </button>
              <button className="btn btn-primary" onClick={next}>
                Continue <Icon.ArrowRight />
              </button>
            </div>
          </div>
        )}

        {step === 3 && (
          <div>
            <div className="field">
              <label>Your name <span className="req">*</span></label>
              <input
                className="input"
                type="text"
                placeholder="First &amp; last name"
                value={data.name}
                onChange={e => update("name", e.target.value)}
              />
              {errs.name && <div className="err">{errs.name}</div>}
            </div>

            <div className="field">
              <label>Phone <span className="req">*</span></label>
              <div className="input-icon">
                <Icon.Phone />
                <input
                  className="input"
                  type="tel"
                  placeholder="(404) 555-0188"
                  value={data.phone}
                  onChange={e => update("phone", e.target.value)}
                />
              </div>
              {errs.phone && <div className="err">{errs.phone}</div>}
            </div>

            <div className="field">
              <label>Email <span style={{color: "var(--ink-3)", fontWeight: 400}}>(optional)</span></label>
              <input
                className="input"
                type="email"
                placeholder="you@example.com"
                value={data.email}
                onChange={e => update("email", e.target.value)}
              />
            </div>

            <div className="form-actions">
              <button className="btn btn-ghost" onClick={back} disabled={submitting}>
                <Icon.ArrowLeft /> Back
              </button>
              <button className="btn btn-primary" onClick={next} disabled={submitting}>
                {submitting ? "Sending…" : "Get my cash offer"} <Icon.ArrowRight />
              </button>
            </div>

            <div className="micro">
              <Icon.Lock />
              <span>By submitting, you agree to be contacted about your property. We never sell your data. No spam, ever.</span>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

    return () => window.removeEventListener("scroll", onScroll);

  <!-- app.jsx (modified: no tweaks, hardcoded defaults) -->
  <script type="text/babel">
// Main app shell — production build with hardcoded defaults.
const { useEffect: useAppEffect } = React;

const ACCENTS = {
  olive:    { name: "Olive",     accent: "#5a6a3a", deep: "#3f4b27", soft: "#c7cda6", gold: "#b89456" },
  midnight: { name: "Midnight",  accent: "#2f4a6a", deep: "#1f3047", soft: "#bcc8d6", gold: "#b89456" },
  clay:     { name: "Clay",      accent: "#a05a3a", deep: "#7a3f25", soft: "#e6c8b3", gold: "#c69152" },
  emerald:  { name: "Emerald",   accent: "#2f6a4a", deep: "#1f4a33", soft: "#b3d6c2", gold: "#c69152" },
  ink:      { name: "Pure Ink",  accent: "#1c1b18", deep: "#1c1b18", soft: "#d9d3c4", gold: "#b89456" },
};

const BGS = {
  cream: { name: "Cream",     bg: "#f4f1ea", bg2: "#ece7dc", paper: "#fbf9f4" },
  bone:  { name: "Bone",      bg: "#f0ece2", bg2: "#e6e0d0", paper: "#faf6ec" },
  fog:   { name: "Cool fog",  bg: "#eef0ee", bg2: "#e2e6e2", paper: "#f8faf8" },
  paper: { name: "Bright",    bg: "#f7f6f1", bg2: "#eeeae0", paper: "#ffffff" },
};

// Hardcoded production defaults
const PHONE = "";
const ACCENT_KEY = "olive";
const HERO_BG_KEY = "cream";
const SHOW_STRIP = true;
const SHOW_STICKY_MOBILE_CTA = true;
const FORM_BADGE = "Cash offer in 24h";

function applyTheme(accentKey, bgKey) {
  const a = ACCENTS[accentKey] || ACCENTS.olive;
  const b = BGS[bgKey] || BGS.cream;
  const r = document.documentElement;
  r.style.setProperty("--accent", a.accent);
  r.style.setProperty("--accent-deep", a.deep);
  r.style.setProperty("--accent-soft", a.soft);
  r.style.setProperty("--gold", a.gold);
  r.style.setProperty("--bg", b.bg);
  r.style.setProperty("--bg-2", b.bg2);
  r.style.setProperty("--paper", b.paper);
}

function applyBadge(text) {
  let el = document.getElementById("__badge-override");
  if (!el) {
    el = document.createElement("style");
    el.id = "__badge-override";
    document.head.appendChild(el);
  }
  const safe = (text || "").replace(/"/g, "");
  el.textContent = `.form-card-wrap::after { content: "${safe}" !important; }`;
}

function App() {
  useAppEffect(() => { applyTheme(ACCENT_KEY, HERO_BG_KEY); }, []);
  useAppEffect(() => { applyBadge(FORM_BADGE); }, []);

  return (
    <div>
      <Nav phone={PHONE} />
      <Hero />
      <FormSection />
      {SHOW_STRIP && <Strip />}
      <HowItWorks />
      <WhyUs />
      <Situations />
      <Stories />
      <FAQ phone={PHONE} />
      <FinalCTA phone={PHONE} />
      <Footer phone={PHONE} />
      {SHOW_STICKY_MOBILE_CTA && <StickyCTA />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
